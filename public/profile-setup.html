<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantedge - Profile Setup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="moving-background"></div>
    <nav class="navbar">
        <div class="container">
            <div class="logo-container">
                <div class="logo">
                    <span class="logo-text">Quantedge</span>
                    <span class="logo-dot"></span>
                </div>
                <div class="moving-particle"></div>
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/about.html">About</a></li>
                <li><a href="/careers.html">Careers</a></li>
                <li><a href="/login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="form-card float">
            <h1>Complete Your Profile</h1>
            <p class="lead">Please allow microphone access (camera optional).</p>

            <form id="profileForm">
                <div class="form-group">
                    <label><i class="fas fa-microphone"></i> 30-Second Audio Intro <span class="required">*</span></label>
                    <div class="button-group">
                        <button type="button" id="startAudio" class="btn btn-secondary">Start Recording</button>
                        <button type="button" id="stopAudio" class="btn btn-secondary" disabled>Stop Recording</button>
                    </div>
                    <audio id="audioPreview" controls style="display:none; margin-top:1rem;"></audio>
                    <p id="audioStatus"></p>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-camera"></i> Photo </label>
                    <div class="button-group">
                        <button type="button" id="startCamera" class="btn btn-secondary">Open Camera</button>
                        <button type="button" id="capturePhoto" class="btn btn-secondary" disabled>Capture</button>
                    </div>
                    <video id="cameraPreview" width="320" height="240" autoplay style="display:none; margin-top:1rem;"></video>
                    <canvas id="photoCanvas" style="display:none;"></canvas>
                    <img id="photoPreview" style="max-width:320px; margin-top:1rem; display:none;" />
                    <p id="photoStatus"></p>
                </div>

                <div class="form-group">
                    <label for="office"><i class="fas fa-building"></i> Select Office <span class="required">*</span></label>
                    <select id="office" required>
                        <option value="">Select</option>
                        <option value="Bengaluru">Bengaluru</option>
                        <option value="Hyderabad">Hyderabad</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Mumbai">Mumbai</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-map-pin"></i> Your Location <span class="required">*</span></label>
                    <p id="locationStatus">Detecting location...</p>
                    <input type="hidden" id="lat" name="lat">
                    <input type="hidden" id="lon" name="lon">
                </div>

                <button type="submit" class="btn btn-primary pulse" id="submitProfile" disabled>Submit & Proceed to Test</button>
            </form>
            <div id="message"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">Quantedge</div>
                <div class="social-links">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-telegram"></i></a>
                    <a href="#"><i class="fab fa-linkedin"></i></a>
                </div>
                <div class="help-links">
                    <a href="#">FAQ</a> | <a href="#">Support</a> | <a href="#">Privacy</a>
                </div>
                <p>&copy; 2025 Quantedge. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div id="loading-overlay" class="loading-overlay" style="display:none;">
        <div class="spinner"></div>
    </div>

    <script>
        let mediaRecorder, audioChunks = [], audioFile = null, photoFile = null, locationEnabled = false;
        const email = sessionStorage.getItem('candidateEmail');
        if (!email) { alert('Please sign up first'); window.location.href = '/login.html'; }

        window.addEventListener('load', function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => { document.getElementById('lat').value = pos.coords.latitude; document.getElementById('lon').value = pos.coords.longitude; document.getElementById('locationStatus').innerHTML = '<i class="fas fa-check-circle" style="color:green;"></i> Captured'; locationEnabled = true; checkForm(); },
                    err => { document.getElementById('locationStatus').innerHTML = '<i class="fas fa-exclamation-triangle" style="color:red;"></i> Access denied'; locationEnabled = false; checkForm(); }
                );
            }
        });

        document.getElementById('startAudio').addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioFile = new File([audioBlob], 'intro.webm');
                    document.getElementById('audioPreview').src = URL.createObjectURL(audioBlob);
                    document.getElementById('audioPreview').style.display = 'block';
                    document.getElementById('audioStatus').innerHTML = '<i class="fas fa-check-circle"></i> Saved';
                    stream.getTracks().forEach(t => t.stop());
                    checkForm();
                };
                mediaRecorder.start();
                document.getElementById('startAudio').disabled = true;
                document.getElementById('stopAudio').disabled = false;
                document.getElementById('audioStatus').innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Recording...';
                audioChunks = [];
            } catch { alert('Microphone access required.'); }
        });
        document.getElementById('stopAudio').addEventListener('click', () => { mediaRecorder.stop(); document.getElementById('startAudio').disabled = false; document.getElementById('stopAudio').disabled = true; });

        let cameraStream;
        document.getElementById('startCamera').addEventListener('click', async () => {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('cameraPreview').srcObject = cameraStream;
                document.getElementById('cameraPreview').style.display = 'block';
                document.getElementById('startCamera').disabled = true;
                document.getElementById('capturePhoto').disabled = false;
            } catch { alert('Camera optional, you can skip.'); }
        });
        document.getElementById('capturePhoto').addEventListener('click', () => {
            const video = document.getElementById('cameraPreview');
            const canvas = document.getElementById('photoCanvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(blob => {
                photoFile = new File([blob], 'photo.jpg');
                document.getElementById('photoPreview').src = URL.createObjectURL(blob);
                document.getElementById('photoPreview').style.display = 'block';
                document.getElementById('photoStatus').innerHTML = '<i class="fas fa-check-circle"></i> Captured';
                if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
                document.getElementById('startCamera').disabled = false;
                document.getElementById('capturePhoto').disabled = true;
                document.getElementById('cameraPreview').style.display = 'none';
            }, 'image/jpeg');
        });

        function checkForm() {
            const office = document.getElementById('office').value;
            document.getElementById('submitProfile').disabled = !(audioFile && locationEnabled && office);
        }
        document.getElementById('office').addEventListener('change', checkForm);

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!audioFile || !document.getElementById('office').value || !document.getElementById('lat').value) { alert('Complete all mandatory steps'); return; }
            document.getElementById('loading-overlay').style.display = 'flex';
            const formData = new FormData();
            formData.append('email', email);
            formData.append('office', document.getElementById('office').value);
            formData.append('lat', document.getElementById('lat').value);
            formData.append('lon', document.getElementById('lon').value);
            formData.append('audio', audioFile);
            if (photoFile) formData.append('photo', photoFile);
            try {
                const res = await fetch('/api/profile-setup', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) window.location.href = '/test.html';
                else { document.getElementById('message').innerText = data.error; document.getElementById('loading-overlay').style.display = 'none'; }
            } catch { document.getElementById('message').innerText = 'Network error'; document.getElementById('loading-overlay').style.display = 'none'; }
        });

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.href && !this.href.startsWith('#') && !this.href.startsWith('javascript')) {
                    e.preventDefault();
                    document.getElementById('loading-overlay').style.display = 'flex';
                    setTimeout(() => { window.location.href = this.href; }, 200);
                }
            });
        });
    </script>
</body>
</html>
